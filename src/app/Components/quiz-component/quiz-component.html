<div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6 font-sans selection:bg-emerald-500/30">
  
  <div *ngIf="!quizStarted && !quizCompleted" class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-2xl p-10 shadow-2xl text-center">
    <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
    </div>
    <h1 class="text-3xl font-bold text-slate-200 mb-4">Science Quiz</h1>
    <p class="text-slate-400 mb-8 text-lg">Answer the following questions. Good luck!</p>
    
    <button (click)="startQuiz()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 py-4 rounded-xl font-bold transition-all shadow-lg hover:shadow-emerald-500/20 active:scale-95 text-lg">
      Start Timer & Begin
    </button>
  </div>

  <div *ngIf="quizStarted && !quizCompleted" class="max-w-2xl w-full bg-slate-900 border border-slate-800 rounded-2xl p-8 md:p-10 shadow-2xl relative overflow-hidden">
    
    <div class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
      <span class="text-emerald-400 font-bold text-lg md:text-xl tracking-wide">
        Question {{ currentQuestionIndex + 1 }} of {{ questions.length }}
      </span>
      
     
    </div>

    <h2 class="text-xl md:text-2xl text-slate-200 mb-8 leading-relaxed font-medium">
      {{ currentQuestion.text }}
    </h2>

    <div class="space-y-4">
      <button *ngFor="let option of currentQuestion.options"
              (click)="selectOption(option)"
              [disabled]="isAnswered"
              [ngClass]="getOptionClass(option)"
              class="w-full text-left p-5 rounded-xl border-2 transition-all duration-300 font-medium text-base md:text-lg disabled:cursor-default">
         {{ option.text }}
      </button>
    </div>

    <div class="mt-10 flex justify-end min-h-[48px]">
      <button *ngIf="isAnswered" 
              (click)="nextQuestion()" 
              class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-8 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-emerald-500/20 active:scale-95">
        {{ currentQuestionIndex === questions.length - 1 ? 'See Results' : 'Next Question' }} →
      </button>
    </div>
    
  </div>

  <div *ngIf="quizCompleted" class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-2xl p-10 shadow-2xl text-center">
    <div class="w-24 h-24 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
      </svg>
    </div>
    <h2 class="text-3xl font-bold text-slate-200 mb-2">Quiz Completed!</h2>
    <p class="text-slate-400 mb-8 text-lg">You scored <span class="text-emerald-400 font-bold text-2xl">{{ score }}</span> out of <span class="text-slate-200 font-bold text-2xl">{{ questions.length }}</span></p>
    
    <button (click)="restartQuiz()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 py-4 rounded-xl font-bold transition-all shadow-lg hover:shadow-emerald-500/20 active:scale-95 text-lg">
      Play Again
    </button>
  </div>
</div>
